version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: alert-service-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: alert
      POSTGRES_USER: alert
      POSTGRES_PASSWORD: alert
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alert -d alert"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
