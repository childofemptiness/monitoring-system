version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: url-monitor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: monitor
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: monitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor -d monitor"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: